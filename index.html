    <script>
      // GitHub Pages SPA fallback support (used with public/404.html).
      // If the user hits a deep link, Pages serves 404.html which stores the
      // original URL in sessionStorage and redirects to the app root.
      // This script restores the original path once the app loads.
      (function () {
        var redirect = sessionStorage.getItem("redirect");
        if (redirect) {
          sessionStorage.removeItem("redirect");
          if (redirect !== window.location.href) {
            window.history.replaceState(null, "", redirect);
          }
        }
      })();
